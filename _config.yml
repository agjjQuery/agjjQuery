plugins:
  - jekyll-redirect-from
  - jekyll-remote-theme

remote_theme:         andrewgjohnson/open-source-documentation-jekyll-theme
title:                agjjQuery
name:                 agjjQuery
description:          agjjQuery is a collection of plugins started by Andrew G. Johnson for Javascript’s jQuery library
author:               Andrew G. Johnson
author_email:         andrew@andrewgjohnson.com
email:                agjjQuery.org@gmail.com
url:                  https://agjjQuery.org
includes_dir:         .
favicon:              https://github.githubassets.com/favicon.ico
footer_text:          agjgd.org
footer_url:           https://agjgd.org
copyright_year_start: 2024
syntax_highlighting:  true
cover_image:          forest
custom_head:          <script>if (location.pathname == "/documentation" || location.pathname.indexOf("/documentation/") === 0) window.location.href = "/";</script>
social_links:
  - platform:         twitter
    url:              https://twitter.com/agjjQuery
    label:            agjjQuery on Twitter
  - platform:         github
    url:              https://github.com/agjjQuery/agjjQuery
    label:            agjjQuery on GitHub
  - platform:         patreon
    url:              https://www.patreon.com/agjopensource
    label:            agjjQuery on Patreon
  - platform:         x
    url:              https://x.com/agjjQuery
    label:            agjjQuery on 𝕏
exclude:              [
                       .github,
                       .github/*.md,
                       .github/*.yml,
                       .github/CODEOWNERS,
                       bower.json,
                       bower_components,
                       bower_components/*.md,
                       CHANGELOG.md,
                       CNAME,
                       documentation/README.md,
                       LICENSE,
                       node_modules,
                       node_modules/*.md,
                       package-lock.json,
                       package.json,
                       README.md,
                       yarn-error.log,
                       yarn.lock
                      ]
